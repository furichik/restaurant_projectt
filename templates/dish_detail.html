{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 700px;">
    <h2>{{ dish.name }}</h2>

    {% if dish.image %}
        <img src="{{ dish.image.url }}" class="img-fluid mb-3">
    {% endif %}

    <p>{{ dish.description }}</p>
    <strong>{{ dish.price }} грн</strong>

    <form method="post" action="{% url 'add_to_cart' dish.id %}">
        {% csrf_token %}

        <h5 class="mt-3">Інгредієнти:</h5>

        {% for ing in ingredients %}
            <div class="form-check">
                <input 
                    class="form-check-input" 
                    type="checkbox" 
                    name="remove_ingredients" 
                    value="{{ ing.name }}"
                    {% if ing.is_required %}disabled{% endif %}
                >

                <label class="form-check-label">
                    {{ ing.name }}
                    {% if ing.price > 0 %}
                        (-{{ ing.price }} грн)
                    {% endif %}
                    {% if ing.is_required %}
                        <span class="text-muted">(обов'язково)</span>
                    {% endif %}
                </label>
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-success mt-3 w-100">
            В кошик
        </button>
    </form>
</div>
{% endblock %}
