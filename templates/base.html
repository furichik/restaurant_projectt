<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Restaurant{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">

        <div>
            <a class="btn btn-primary me-2" href="{% url 'menu' %}">Меню</a>

            <a class="btn btn-warning position-relative" href="{% url 'cart' %}">
                🛒
                {% if request.session.cart %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ request.session.cart|length }}
                    </span>
                {% endif %}
            </a>
        </div>

        <div>
            {% if user.is_authenticated %}
                <a class="btn btn-outline-dark me-2" href="{% url 'profile' %}">Профіль</a>
                <a class="btn btn-outline-danger" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="btn btn-outline-primary me-2" href="{% url 'login' %}">Login</a>
                <a class="btn btn-outline-success" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>

    </div>
</div>

{% block content %}{% endblock %}

</body>
</html>
