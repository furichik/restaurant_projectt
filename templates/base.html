<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Restaurant{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body.dark {
            background-color: #111;
            color: #fff;
        }

        body.light {
            background-color: #f8f9fa;
            color: #000;
        }

        .navbar-custom {
            padding: 15px;
            border-radius: 12px;
        }

        body.dark .navbar-custom {
            background: #1c1c1c;
        }

        body.light .navbar-custom {
            background: #ffffff;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #ff4d4d;
        }

        .btn-main {
            background-color: #ff4d4d;
            color: white;
        }

        .btn-main:hover {
            background-color: #e63c3c;
        }
    </style>
</head>

<body>

<div class="container mt-3">
    <div class="navbar-custom d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-3">
            <div class="logo">🍽 Restaurant</div>

            <a class="btn btn-main" href="{% url 'menu' %}">
                Меню
            </a>
        </div>

        <div class="d-flex align-items-center gap-2">

            <button onclick="toggleTheme()" class="btn btn-secondary">
                🌙 / ☀️
            </button>

            <a class="btn btn-warning position-relative" href="{% url 'cart' %}">
                🛒
                {% if request.session.cart %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ request.session.cart|length }}
                    </span>
                {% endif %}
            </a>

            {% if user.is_authenticated %}
                <a class="btn btn-outline-dark" href="{% url 'profile' %}">Профіль</a>

                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-outline-danger">Вийти</button>
                </form>
            {% else %}
                <a class="btn btn-outline-primary" href="{% url 'login' %}">Вхід</a>
                <a class="btn btn-success" href="{% url 'register' %}">Реєстрація</a>
            {% endif %}

        </div>
    </div>
</div>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
    function toggleTheme() {
        const body = document.body;

        if (body.classList.contains('dark')) {
            body.classList.remove('dark');
            body.classList.add('light');
            localStorage.setItem('theme', 'light');
        } else {
            body.classList.remove('light');
            body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }

    (function () {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.classList.add(savedTheme);
    })();
</script>

</body>
</html>
