<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">

    <title>{% block title %}Restaurant{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body.dark {
            background: #111;
            color: white;
        }

        body.light {
            background: #f5f5f5;
            color: black;
        }

        .navbar-custom {
            padding: 18px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        body.dark .navbar-custom {
            background: rgba(30,30,30,0.9);
        }

        body.light .navbar-custom {
            background: white;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ff4d4d;
        }

        .menu-card {
            border-radius: 25px;
            transition: 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-5px);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(0,0,0,0.9),
                    rgba(0,0,0,0.1));
        }

        body.dark .card {
            background: #1e1e1e;
            color: white;
        }

        body.dark .card-body {
            background: #1e1e1e;
        }

        body.dark .btn-outline-dark {
            color: white;
            border-color: white;
        }

        body.dark .btn-outline-dark:hover {
            background: white;
            color: black;
        }

        .ingredient-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }

        body.light .ingredient-item {
            background: white;
        }

    </style>

</head>

<body>

<div class="container mt-3">

    <div class="navbar-custom d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-3">

            <div class="logo">
                <i class="bi bi-cup-hot-fill"></i>
                Restaurant
            </div>

            <a class="btn btn-danger rounded-pill px-4"
               href="{% url 'menu' %}">
                Меню
            </a>

        </div>

        <div class="d-flex align-items-center gap-2">

            <button onclick="toggleTheme()"
                    class="btn btn-secondary rounded-pill">

                <i class="bi bi-moon-stars-fill"></i>

            </button>

            <a class="btn btn-warning position-relative rounded-pill"
               href="{% url 'cart' %}">

                <i class="bi bi-cart-fill"></i>

                {% if request.session.cart %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ request.session.cart|length }}
                    </span>
                {% endif %}

            </a>

            {% if user.is_authenticated %}

                <a class="btn btn-outline-dark rounded-pill"
                   href="{% url 'profile' %}">
                    Профіль
                </a>

                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}

                    <button class="btn btn-outline-danger rounded-pill">
                        Вийти
                    </button>
                </form>

            {% else %}

                <a class="btn btn-outline-primary rounded-pill"
                   href="{% url 'login' %}">
                    Вхід
                </a>

                <a class="btn btn-danger rounded-pill"
                   href="{% url 'register' %}">
                    Реєстрація
                </a>

            {% endif %}

        </div>

    </div>

</div>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>

function toggleTheme() {

    const body = document.body

    if (body.classList.contains('dark')) {

        body.classList.remove('dark')
        body.classList.add('light')

        localStorage.setItem('theme', 'light')

    } else {

        body.classList.remove('light')
        body.classList.add('dark')

        localStorage.setItem('theme', 'dark')
    }
}

(function () {

    const savedTheme = localStorage.getItem('theme') || 'dark'

    document.body.classList.add(savedTheme)

})()


document.querySelectorAll('.like-btn').forEach(button => {

    button.addEventListener('click', function () {

        let dishId = this.dataset.id

        fetch(`/like/${dishId}/`)
        .then(response => response.json())
        .then(data => {

            this.querySelector('span').innerText = data.likes

        })

    })

})


document.querySelectorAll('.ingredient-btn').forEach(button => {

    button.addEventListener('click', function () {

        let checkbox = document.getElementById(this.dataset.target)

        checkbox.checked = !checkbox.checked

        if (checkbox.checked) {

            this.classList.remove('btn-outline-danger')
            this.classList.add('btn-danger')

            this.innerText = '+'

        } else {

            this.classList.remove('btn-danger')
            this.classList.add('btn-outline-danger')

            this.innerText = '−'
        }

    })

})

</script>

</body>
</html>
